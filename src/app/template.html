<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=240,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Math Kangaroo R1</title>
  <style>
__APP_CSS__
  </style>
</head>
<body data-theme="neon">
  <div id="app" class="app">
    <main id="home-screen" class="screen active">
      <section class="card head-row">
        <h1 id="title">MATH KANGAROO</h1>
        <div class="theme-switch" role="group" aria-label="Theme">
          <button id="theme-gb" class="btn btn-theme" data-theme="gameboy">GB</button>
          <button id="theme-neon" class="btn btn-theme active" data-theme="neon">NEON</button>
        </div>
      </section>

      <div class="screen-scroll" data-scrollable="true" tabindex="0">
        <section class="card">
          <h2>SELECT GRADE</h2>
          <div id="grade-grid" class="grade-grid"></div>
        </section>

        <section class="card">
          <h2>MODE</h2>
          <div class="mode-row">
            <button id="mode-contest" class="btn btn-mode active" data-mode="contest">CONTEST</button>
            <button id="mode-learn" class="btn btn-mode" data-mode="learn">LEARN</button>
            <button id="mode-practice" class="btn btn-mode" data-mode="practice">PRACTICE</button>
          </div>
          <p id="mode-info" class="mode-info"></p>
        </section>
      </div>

      <button id="start-btn" class="btn btn-start">START</button>
    </main>

    <main id="game-screen" class="screen">
      <section class="card hud-bar">
        <div class="hud-stats">
          <div class="hud-item"><span id="hud-grade-label" class="hud-label">G</span><span id="hud-grade">1</span></div>
          <div class="hud-item"><span id="hud-q-label" class="hud-label">Q</span><span id="hud-q">1/24</span></div>
          <div class="hud-item"><span id="hud-points-label" class="hud-label">PTS</span><span id="hud-points">0</span></div>
          <div class="hud-item" id="hud-timer-wrap"><span id="hud-time-label" class="hud-label">T</span><span id="hud-time">75:00</span></div>
        </div>
        <div class="hud-actions" aria-label="Game controls">
          <button id="home-btn" class="icon-btn btn-ghost" aria-label="Go home" title="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.5 10.5 12 4.8l7.5 5.7" />
              <path d="M7.2 10.3v8h9.6v-8" />
            </svg>
          </button>
          <button id="coach-btn" class="icon-btn btn-ghost" aria-label="Open help" title="Help">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8.3" />
              <path d="M9.5 9.3a2.7 2.7 0 1 1 4 2.3c-.8.5-1.3 1-1.3 1.9" />
              <circle cx="12" cy="16.8" r=".9" fill="currentColor" stroke="none" />
            </svg>
          </button>
        </div>
      </section>
      <div id="action-hint" class="action-hint" hidden>⌂ home · ? help</div>

      <section class="card question-card" data-scrollable="true" tabindex="0">
        <div id="question-meta" class="question-meta"></div>
        <div id="topic-browser" class="topic-browser" hidden></div>
        <div id="guided-panel" class="guided-panel" hidden>
          <div class="guided-top">
            <div class="guided-headings">
              <div id="guided-topic-title" class="guided-topic-title"></div>
              <div id="guided-step-index" class="guided-step-index"></div>
            </div>
            <button id="guided-back" class="guided-back btn-ghost" aria-label="Back to topics">TOPICS</button>
          </div>
          <div id="guided-step-title" class="guided-step-title"></div>
          <div id="guided-derivation" class="guided-derivation"></div>
          <div id="guided-visual" class="guided-visual" aria-live="polite"></div>
          <div id="guided-step-body" class="guided-step-body"></div>
          <div id="guided-controls" class="guided-controls"></div>
          <div id="guided-choice-prompt" class="guided-choice-prompt" hidden></div>
          <div id="guided-choice-options" class="guided-choice-options" hidden></div>
          <div id="guided-choice-feedback" class="guided-choice-feedback" hidden></div>
          <div class="guided-actions">
            <button id="guided-next" class="btn btn-start">NEXT</button>
          </div>
        </div>
        <div id="learn-panel" class="learn-panel" hidden>
          <div class="learn-top">
            <div class="learn-headings">
              <div id="learn-step-title" class="learn-step-title"></div>
              <div id="learn-step-index" class="learn-step-index"></div>
            </div>
            <button id="learn-skip" class="learn-skip-btn btn-ghost" aria-label="Skip lesson">SKIP</button>
          </div>
          <div class="learn-progress"><span id="learn-progress-fill"></span></div>
          <div id="learn-objective" class="learn-objective"></div>
          <div id="learn-visual" class="learn-visual" aria-live="polite"></div>
          <div id="learn-step-body" class="learn-step-body"></div>
          <div id="learn-step-prompt" class="learn-step-prompt" hidden></div>
          <div id="learn-options" class="learn-options" hidden></div>
          <div id="learn-feedback" class="learn-feedback" hidden></div>
          <div class="learn-actions">
            <button id="learn-next" class="btn btn-mode">NEXT</button>
          </div>
        </div>
        <div id="question-text" class="question-text"></div>
        <div id="question-visual" class="question-visual" aria-live="polite"></div>
        <div id="options" class="options"></div>
        <div id="scroll-rail" class="scroll-rail" hidden aria-hidden="true">
          <button id="scroll-rail-up" class="scroll-rail-step" aria-label="Scroll up">▲</button>
          <div id="scroll-rail-track" class="scroll-rail-track" aria-hidden="true">
            <div id="scroll-rail-thumb" class="scroll-rail-thumb"></div>
          </div>
          <button id="scroll-rail-down" class="scroll-rail-step" aria-label="Scroll down">▼</button>
        </div>
      </section>
    </main>

    <main id="result-screen" class="screen">
      <section class="card result-card" data-scrollable="true" tabindex="0">
        <h2>RESULT</h2>
        <p class="result-line">Score: <span id="res-score"></span></p>
        <p class="result-line">Correct: <span id="res-correct"></span></p>
        <p class="result-line">Accuracy: <span id="res-accuracy"></span></p>
        <p class="result-line" id="res-stage"></p>
        <p class="result-line" id="res-focus"></p>
      </section>
      <div class="result-actions">
        <button id="retry-btn" class="btn btn-start">PLAY AGAIN</button>
        <button id="quit-btn" class="btn btn-ghost">HOME</button>
      </div>
    </main>

    <div id="coach-overlay" class="overlay" aria-hidden="true">
      <section class="card overlay-card">
        <h2 id="coach-title">Help</h2>
        <p id="coach-status" class="coach-status">Pick a card, then tap SAY IT or press the side button.</p>
        <div class="coach-mode-row">
          <button id="coach-hint" class="btn btn-mode coach-mode-btn" data-help-mode="hint">HINT</button>
          <button id="coach-steps" class="btn btn-mode coach-mode-btn" data-help-mode="steps">STEPS</button>
          <button id="coach-explain" class="btn btn-mode coach-mode-btn" data-help-mode="explain">WHY</button>
        </div>
        <div id="coach-visual" class="coach-visual" aria-live="polite"></div>
        <pre id="coach-body" class="coach-body" data-scrollable="true" tabindex="0"></pre>
        <div class="coach-bottom">
          <button id="coach-say" class="btn btn-mode">SAY IT</button>
          <button id="coach-continue" class="btn btn-start">CONTINUE</button>
        </div>
      </section>
    </div>
  </div>

  <script>
__APP_JS__
  </script>
</body>
</html>
